<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CaneNext | Online Signature System</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.6/dist/signature_pad.umd.min.js"></script>
</head>
<body>
  <header class="app-header">
    <div>
      <h1>CaneNext</h1>
      <h2>Online Signature System</h2>
    </div>
    <button id="loginBtn" class="primary-btn">เข้าสู่ระบบ Google</button>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <button id="loadPdfBtn" class="menu-btn" disabled>ดึงไฟล์ PDF</button>
      <div id="status" class="status">กรุณาเข้าสู่ระบบ Google</div>
      <div id="fileList" class="file-list"></div>
    </aside>

    <section class="workspace">
      <div class="toolbar">
        <button id="prevPageBtn" disabled>หน้าก่อนหน้า</button>
        <span id="pageInfo">หน้า - / -</span>
        <button id="nextPageBtn" disabled>หน้าถัดไป</button>
        <button id="clearSignatureBtn" disabled>ล้างลายเซ็น</button>
        <button id="savePdfBtn" class="primary-btn" disabled>บันทึก PDF</button>
      </div>

      <div class="pdf-wrap">
        <canvas id="pdfCanvas"></canvas>
      </div>

      <section class="signature-section">
        <div class="signature-title">พื้นที่เซ็นชื่อ</div>
        <canvas id="signatureCanvas"></canvas>
      </section>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>

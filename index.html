<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CaneNext : Online Signature System</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
  <script src="config.js"></script>
</head>
<body>
  <header class="app-header">
    <div>
      <h1>CaneNext</h1>
      <div class="subtitle">Online Signature System</div>
    </div>
    <div class="auth-area">
      <span id="userStatus" class="user-status">ยังไม่ได้เข้าสู่ระบบ</span>
      <button id="loginBtn" class="btn primary">เข้าสู่ระบบ</button>
      <button id="logoutBtn" class="btn ghost hidden">ออกจากระบบ</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-page="documents">เอกสาร PDF</button>
    <button class="tab" data-page="summary">สรุปสถานะเอกสาร</button>
  </nav>

  <main class="layout">
    <section id="documentsPage" class="page active">
      <div class="panel toolbar">
        <button id="loadFilesBtn" class="btn primary">ดึงไฟล์ PDF</button>
        <input id="searchInput" type="search" placeholder="ค้นหาชื่อไฟล์ PDF" />
        <button id="clearSearchBtn" class="btn ghost" type="button">ล้างการค้นหา</button>
        <select id="statusFilter">
          <option value="all">ทั้งหมด</option>
          <option value="unsigned">ยังไม่เซ็น</option>
          <option value="signed">เซ็นแล้ว</option>
        </select>
      </div>

      <div class="content-grid">
        <aside class="panel file-panel">
          <h2>รายการเอกสาร PDF</h2>
          <div id="fileList" class="file-list empty">กรุณาเข้าสู่ระบบ แล้วกดดึงไฟล์ PDF</div>
        </aside>

        <section class="panel viewer-panel">
          <div class="viewer-top">
            <div>
              <h2 id="currentFileName">ยังไม่ได้เลือกไฟล์</h2>
              <span id="docStatus" class="badge muted">-</span>
            </div>
            <div class="page-control">
              <button id="prevPageBtn" class="btn small">ก่อนหน้า</button>
              <span id="pageInfo">หน้า - / -</span>
              <button id="nextPageBtn" class="btn small">ถัดไป</button>
            </div>
          </div>

          <div id="pdfWrap" class="pdf-wrap">
            <canvas id="pdfCanvas"></canvas>
          </div>

          <div class="sign-section">
            <h3>พื้นที่ลงลายเซ็น</h3>
            <canvas id="signatureCanvas"></canvas>
            <div class="sign-options">
              <input id="signPageInput" type="hidden" min="1" value="1" />
              <select id="signaturePosition" class="hidden" aria-hidden="true">
                <option value="bottom-right">ล่างขวา</option>
              </select>
              <div class="sign-note">ตำแหน่งบันทึก: หน้าสุดท้าย · มุมขวาล่างสุด</div>
              <button id="clearSigBtn" class="btn ghost">ล้างลายเซ็น</button>
              <button id="saveSignedBtn" class="btn success">บันทึกลายเซ็นลง PDF</button>
            </div>
          </div>
        </section>
      </div>
    </section>

    <section id="summaryPage" class="page">
      <div class="summary-cards">
        <div class="summary-card"><div>ไฟล์ต้นฉบับทั้งหมด</div><strong id="totalCount">0</strong></div>
        <div class="summary-card"><div>เซ็นแล้ว</div><strong id="signedCount">0</strong></div>
        <div class="summary-card"><div>คงเหลือ</div><strong id="unsignedCount">0</strong></div>
      </div>
      <div class="panel">
        <h2>รายการที่ยังไม่เซ็น</h2>
        <div id="unsignedList" class="file-list empty">ยังไม่มีข้อมูล</div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
